<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key of Solomon // Control Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Caveat:wght@500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06080f; --bg2:#0a0e1a; --panel:rgba(16,22,38,.72); --panel2:rgba(22,30,52,.85);
  --line:rgba(0,240,255,.14); --line2:rgba(0,240,255,.32);
  --txt:#d7e4f5; --dim:#7a8aa6; --faint:#46546e;
  --cyan:#00f0ff; --blue:#3b82f6; --pink:#ff2d95; --purple:#a78bfa; --lime:#b6ff2e; --amber:#ffb020; --red:#ff4757;
  --font-d:'Chakra Petch',sans-serif; --font-b:'Rajdhani',sans-serif; --font-m:'Share Tech Mono',monospace; --font-h:'Caveat',cursive;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg); color:var(--txt); font-family:var(--font-b); font-size:16px; min-height:100vh;
  background-image:
    radial-gradient(1100px 500px at 85% -10%, rgba(167,139,250,.07), transparent 60%),
    radial-gradient(900px 480px at -10% 110%, rgba(0,240,255,.06), transparent 60%),
    repeating-linear-gradient(0deg, transparent 0 39px, rgba(120,160,255,.025) 39px 40px),
    repeating-linear-gradient(90deg, transparent 0 39px, rgba(120,160,255,.025) 39px 40px);
}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:rgba(0,240,255,.18);border-radius:4px}
.shell{display:flex;min-height:100vh}
/* ---------- sidebar ---------- */
.side{width:218px;flex-shrink:0;border-right:1px solid var(--line);background:rgba(8,11,20,.92);padding:20px 14px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
.logo{font-family:var(--font-d);font-weight:700;font-size:20px;letter-spacing:2px;color:#fff;margin-bottom:4px}
.logo span{color:var(--cyan);text-shadow:0 0 12px var(--cyan)}
.logo small{display:block;font-family:var(--font-m);font-size:10px;color:var(--dim);letter-spacing:3px;margin-top:2px}
.nav{margin-top:18px;display:flex;flex-direction:column;gap:2px}
.nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--dim);text-decoration:none;font-weight:600;font-size:15px;letter-spacing:.6px;border:1px solid transparent;transition:.18s}
.nav a:hover{color:var(--txt);background:rgba(0,240,255,.05)}
.nav a.active{color:var(--cyan);background:rgba(0,240,255,.08);border-color:var(--line2);box-shadow:inset 0 0 18px rgba(0,240,255,.06)}
.nav a .ico{width:18px;text-align:center;font-family:var(--font-m)}
.side .foot{margin-top:auto;font-family:var(--font-m);font-size:10px;color:var(--faint);line-height:1.8}
.side .foot a{color:var(--dim)}
/* ---------- main ---------- */
main{flex:1;padding:24px 30px 60px;max-width:1300px}
.topbar{display:flex;gap:14px;align-items:center;margin-bottom:24px;flex-wrap:wrap}
h1.page{font-family:var(--font-d);font-size:24px;font-weight:600;letter-spacing:1.5px;color:#fff}
h1.page em{color:var(--cyan);font-style:normal}
.quickadd{flex:1;min-width:280px;display:flex;gap:8px}
.quickadd input{flex:1}
input,select,textarea{
  background:rgba(10,14,26,.9);border:1px solid var(--line);border-radius:8px;color:var(--txt);
  font-family:var(--font-b);font-size:15px;font-weight:500;padding:9px 12px;outline:none;transition:.18s;
}
input:focus,select:focus,textarea:focus{border-color:var(--line2);box-shadow:0 0 0 2px rgba(0,240,255,.1)}
textarea{resize:vertical;min-height:70px;width:100%}
label{display:block;font-family:var(--font-m);font-size:10px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin:12px 0 4px}
button{
  font-family:var(--font-d);font-weight:600;font-size:13px;letter-spacing:1px;cursor:pointer;border-radius:8px;
  padding:9px 16px;border:1px solid var(--line2);background:rgba(0,240,255,.08);color:var(--cyan);transition:.18s;text-transform:uppercase;
}
button:hover{background:rgba(0,240,255,.16);box-shadow:0 0 14px rgba(0,240,255,.25)}
button.ghost{border-color:rgba(122,138,166,.3);background:transparent;color:var(--dim)}
button.ghost:hover{color:var(--txt);box-shadow:none;border-color:var(--dim)}
button.pink{border-color:rgba(255,45,149,.4);background:rgba(255,45,149,.1);color:var(--pink)}
button.pink:hover{background:rgba(255,45,149,.2);box-shadow:0 0 14px rgba(255,45,149,.25)}
button.lime{border-color:rgba(182,255,46,.35);background:rgba(182,255,46,.08);color:var(--lime)}
button.lime:hover{background:rgba(182,255,46,.16);box-shadow:0 0 14px rgba(182,255,46,.2)}
button.danger{border-color:rgba(255,71,87,.4);background:rgba(255,71,87,.08);color:var(--red)}
button.sm{padding:5px 10px;font-size:11px}
/* ---------- cards & panels ---------- */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;backdrop-filter:blur(8px)}
.grid{display:grid;gap:14px}
.grid.cols4{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
.grid.cols3{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.statcard{position:relative;overflow:hidden;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.statcard .num{font-family:var(--font-d);font-size:38px;font-weight:700;line-height:1}
.statcard .lbl{font-family:var(--font-m);font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-top:6px}
.statcard::after{content:"";position:absolute;inset:auto 0 0 0;height:2px;background:linear-gradient(90deg,transparent,var(--c,var(--cyan)),transparent);opacity:.8}
.statcard .num{color:var(--c,var(--cyan));text-shadow:0 0 18px color-mix(in srgb,var(--c,var(--cyan)) 50%,transparent)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 16px;cursor:pointer;transition:.18s;position:relative}
.card:hover{border-color:var(--line2);transform:translateY(-2px);box-shadow:0 6px 22px rgba(0,0,0,.45),0 0 18px rgba(0,240,255,.06)}
.card h3{font-family:var(--font-d);font-size:16px;font-weight:600;color:#fff;margin-bottom:4px}
.card .desc{color:var(--dim);font-size:14px;line-height:1.45;margin-bottom:8px}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.spread{justify-content:space-between}
/* badges */
.badge{display:inline-block;font-family:var(--font-m);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:5px;border:1px solid}
.b-todo{color:var(--blue);border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.08)}
.b-in_progress,.b-active{color:var(--cyan);border-color:rgba(0,240,255,.4);background:rgba(0,240,255,.07)}
.b-waiting,.b-paused{color:var(--amber);border-color:rgba(255,176,32,.4);background:rgba(255,176,32,.08)}
.b-blocked{color:var(--red);border-color:rgba(255,71,87,.5);background:rgba(255,71,87,.1)}
.b-done,.b-completed{color:var(--lime);border-color:rgba(182,255,46,.4);background:rgba(182,255,46,.08)}
.b-planning,.b-captured{color:var(--purple);border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.08)}
.b-reviewing{color:var(--cyan);border-color:rgba(0,240,255,.4);background:rgba(0,240,255,.07)}
.b-possible{color:var(--lime);border-color:rgba(182,255,46,.4);background:rgba(182,255,46,.08)}
.b-converted{color:var(--dim);border-color:rgba(122,138,166,.4)}
.b-archived{color:var(--faint);border-color:rgba(70,84,110,.5)}
.b-urgent{color:#fff;border-color:var(--pink);background:rgba(255,45,149,.25);animation:pulse 1.6s infinite}
.b-high{color:var(--pink);border-color:rgba(255,45,149,.45);background:rgba(255,45,149,.08)}
.b-medium{color:var(--amber);border-color:rgba(255,176,32,.4);background:rgba(255,176,32,.07)}
.b-low{color:var(--dim);border-color:rgba(122,138,166,.35)}
.b-agent{color:var(--purple);border-color:rgba(167,139,250,.45);background:rgba(167,139,250,.1)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,45,149,.4)}50%{box-shadow:0 0 10px 2px rgba(255,45,149,.55)}}
.tag{font-family:var(--font-m);font-size:10px;color:var(--cyan);opacity:.75}
/* progress */
.prog{height:7px;background:rgba(0,240,255,.08);border-radius:4px;overflow:hidden;margin:8px 0 4px;border:1px solid rgba(0,240,255,.12)}
.prog i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:4px;box-shadow:0 0 10px rgba(0,240,255,.5);transition:width .6s ease}
/* filter bar */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.filters input[type=search]{min-width:220px}
.filters select{min-width:120px}
/* task list rows */
.trow{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:8px;transition:.15s}
.trow:hover{border-color:var(--line2)}
.trow .t-title{flex:1;font-weight:600;font-size:16px;color:#fff;cursor:pointer}
.trow .t-title small{display:block;color:var(--dim);font-weight:500;font-size:13px}
.trow.done .t-title{color:var(--faint);text-decoration:line-through}
.trow select.status{font-family:var(--font-m);font-size:11px;padding:5px 8px}
.chk{width:20px;height:20px;border:1px solid var(--line2);border-radius:5px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:transparent;transition:.15s;background:rgba(0,240,255,.04)}
.chk.on{color:var(--lime);border-color:var(--lime);box-shadow:0 0 8px rgba(182,255,46,.4)}
.due{font-family:var(--font-m);font-size:11px;color:var(--dim)}
.due.over{color:var(--red);text-shadow:0 0 8px rgba(255,71,87,.6)}
.due.soon{color:var(--amber)}
/* ideas */
.idea-card{background:linear-gradient(160deg,rgba(20,18,38,.9),rgba(12,16,30,.9));border:1px solid rgba(167,139,250,.25);border-radius:12px;padding:16px;cursor:pointer;transition:.18s}
.idea-card:hover{border-color:rgba(167,139,250,.55);transform:translateY(-2px);box-shadow:0 0 22px rgba(167,139,250,.12)}
.idea-card h3{font-family:var(--font-h);font-size:24px;font-weight:600;color:#e9ddff;margin-bottom:6px}
.idea-card .body{font-family:var(--font-h);font-size:18px;color:#b9a8e8;line-height:1.3;margin-bottom:10px}
/* feed */
.feeditem{display:flex;gap:12px;padding:12px 4px;border-bottom:1px dashed rgba(0,240,255,.1)}
.feeditem .who{font-family:var(--font-m);font-size:10px;letter-spacing:1px;padding:3px 7px;border-radius:4px;height:fit-content;white-space:nowrap}
.who.user{color:var(--cyan);border:1px solid rgba(0,240,255,.3)}
.who.agent{color:var(--purple);border:1px solid rgba(167,139,250,.4)}
.who.system{color:var(--dim);border:1px solid rgba(122,138,166,.3)}
.feeditem .body{flex:1;font-size:15px;line-height:1.45}
.feeditem .meta{font-family:var(--font-m);font-size:10px;color:var(--faint);margin-top:3px}
/* drawer */
.drawer-veil{position:fixed;inset:0;background:rgba(3,5,10,.6);backdrop-filter:blur(2px);z-index:40;opacity:0;pointer-events:none;transition:.25s}
.drawer-veil.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:-560px;width:540px;max-width:95vw;height:100vh;background:var(--bg2);border-left:1px solid var(--line2);z-index:50;transition:right .28s cubic-bezier(.2,.8,.2,1);overflow-y:auto;padding:24px;box-shadow:-20px 0 60px rgba(0,0,0,.6)}
.drawer.open{right:0}
.drawer h2{font-family:var(--font-d);font-size:19px;color:#fff;letter-spacing:1px}
.drawer .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}
.note-bubble{background:rgba(14,20,36,.8);border:1px solid var(--line);border-left:3px solid var(--cyan);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.note-bubble.agent_update{border-left-color:var(--purple)}
.note-bubble.blocker{border-left-color:var(--red)}
.note-bubble.progress{border-left-color:var(--lime)}
.note-bubble.decision{border-left-color:var(--amber)}
.note-bubble .nb-body{font-size:15px;line-height:1.4}
.note-bubble .nb-meta{font-family:var(--font-m);font-size:10px;color:var(--faint);margin-top:4px}
.att-row{display:flex;gap:8px;align-items:center;padding:7px 10px;border:1px solid var(--line);border-radius:8px;margin-bottom:6px;font-size:14px}
.att-row a{color:var(--cyan);text-decoration:none}
.range-row{display:flex;align-items:center;gap:12px}
input[type=range]{flex:1;accent-color:var(--cyan)}
/* toast */
#toasts{position:fixed;bottom:20px;right:20px;z-index:99;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--panel2);border:1px solid var(--line2);border-radius:10px;padding:11px 16px;font-family:var(--font-d);font-size:13px;letter-spacing:.5px;color:var(--cyan);box-shadow:0 0 20px rgba(0,240,255,.15);animation:slidein .25s}
.toast.err{color:var(--red);border-color:rgba(255,71,87,.5);box-shadow:0 0 20px rgba(255,71,87,.15)}
@keyframes slidein{from{transform:translateX(40px);opacity:0}}
.empty{color:var(--faint);font-family:var(--font-m);font-size:12px;letter-spacing:1px;padding:30px;text-align:center;border:1px dashed rgba(70,84,110,.4);border-radius:10px}
.section-title{font-family:var(--font-m);font-size:11px;letter-spacing:2.5px;color:var(--dim);text-transform:uppercase;margin:26px 0 12px;display:flex;align-items:center;gap:10px}
.section-title::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line2),transparent)}
.mono{font-family:var(--font-m);font-size:12px;color:var(--dim)}
code.tok{background:rgba(0,240,255,.07);border:1px solid var(--line);padding:3px 8px;border-radius:6px;font-family:var(--font-m);font-size:12px;color:var(--cyan)}
@media(max-width:860px){.side{display:none}main{padding:16px}}
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="logo">KEY OF <span>SOLOMON</span><small>CONTROL PANEL · β1</small></div>
    <nav class="nav" id="nav">
      <a href="#/overview" data-r="overview"><span class="ico">◈</span> Overview</a>
      <a href="#/projects" data-r="projects"><span class="ico">▣</span> Projects</a>
      <a href="#/tasks" data-r="tasks"><span class="ico">☰</span> Tasks</a>
      <a href="#/ideas" data-r="ideas"><span class="ico">✦</span> Ideas</a>
      <a href="#/activity" data-r="activity"><span class="ico">≋</span> Activity</a>
      <a href="#/agent" data-r="agent"><span class="ico">⌬</span> Agent</a>
      <a href="#/settings" data-r="settings"><span class="ico">⚙</span> Settings</a>
    </nav>
    <div class="foot">
      <a href="/dashboard" target="_blank">→ LIVE DASHBOARD</a><br>
      API: <span id="foot-api">/api/v1</span><br>
      <span id="foot-status">●</span> <span id="foot-conn">connecting…</span>
    </div>
  </aside>
  <main id="main"></main>
</div>

<div class="drawer-veil" id="veil" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"></div>
<div id="toasts"></div>

<script>
/* ================= API layer ================= */
let TOKEN = null, API = "/api/v1";
async function boot(){
  try{
    const r = await fetch("/ui-config"); const j = await r.json();
    TOKEN = j.data.token; API = j.data.apiBase;
  }catch(e){ toast("Could not load /ui-config — is the server running?", true); }
  connectSSE();
  route();
}
async function api(path, opts={}){
  const r = await fetch(API+path, {
    ...opts,
    headers:{ "Content-Type":"application/json", "Authorization":"Bearer "+TOKEN, ...(opts.headers||{}) },
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  const j = await r.json();
  if(!j.success){ throw new Error(j.error?.message || "API error"); }
  return j.data;
}
function toast(msg, err=false){
  const t=document.createElement("div"); t.className="toast"+(err?" err":""); t.textContent=msg;
  document.getElementById("toasts").appendChild(t);
  setTimeout(()=>t.remove(), 3500);
}
/* SSE live refresh */
let sse, sseRetry=0;
function connectSSE(){
  try{
    sse = new EventSource(API+"/events?token="+encodeURIComponent(TOKEN));
    sse.addEventListener("connected", ()=>{ setConn(true); sseRetry=0; });
    sse.addEventListener("data-changed", ()=>{ if(!drawerOpen) route(true); });
    sse.onerror = ()=>{ setConn(false); sse.close(); setTimeout(connectSSE, Math.min(15000, 1500*(++sseRetry))); };
  }catch(e){ setConn(false); }
}
function setConn(ok){
  document.getElementById("foot-status").style.color = ok ? "var(--lime)" : "var(--red)";
  document.getElementById("foot-conn").textContent = ok ? "live" : "reconnecting…";
}
/* ================= helpers ================= */
const esc = s => (s??"").toString().replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const fmtDate = s => s ? new Date(s).toLocaleDateString(undefined,{month:"short",day:"numeric"}) : "";
const fmtDT = s => s ? new Date(s).toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}) : "";
const ago = s => { if(!s) return ""; const d=(Date.now()-new Date(s))/1000;
  if(d<60) return "just now"; if(d<3600) return Math.floor(d/60)+"m ago"; if(d<86400) return Math.floor(d/3600)+"h ago"; return Math.floor(d/86400)+"d ago"; };
const badge = (v)=> v?`<span class="badge b-${esc(v)}">${esc(v.replace(/_/g," "))}</span>`:"";
const tagchips = t => (t||[]).map(x=>`<span class="tag">#${esc(x)}</span>`).join(" ");
const dueHtml = (d,status)=>{ if(!d) return ""; const over=new Date(d)<new Date()&&!["done","archived","completed"].includes(status);
  const soon=!over&&(new Date(d)-new Date())<3*864e5;
  return `<span class="due ${over?"over":soon?"soon":""}">⏱ ${fmtDate(d)}${over?" OVERDUE":""}</span>`; };
/* ================= router ================= */
const MAIN = document.getElementById("main");
window.addEventListener("hashchange", ()=>route());
function curRoute(){ return (location.hash||"#/overview").split("/")[1]||"overview"; }
async function route(soft=false){
  const r = curRoute();
  document.querySelectorAll("#nav a").forEach(a=>a.classList.toggle("active", a.dataset.r===r));
  try{
    if(r==="overview") await viewOverview();
    else if(r==="projects") await viewProjects();
    else if(r==="tasks") await viewTasks();
    else if(r==="ideas") await viewIdeas();
    else if(r==="activity") await viewActivity();
    else if(r==="agent") await viewAgent();
    else if(r==="settings") await viewSettings();
  }catch(e){ if(!soft) MAIN.innerHTML=`<div class="empty">⚠ ${esc(e.message)}</div>`; }
}
/* filter state survives re-render */
const F = { projects:{q:"",status:"",priority:""}, tasks:{q:"",status:"",area:"",priority:""}, ideas:{q:"",status:"",category:""}, activity:{parentType:"",createdBy:""} };
function qs(obj){ const p=Object.entries(obj).filter(([k,v])=>v).map(([k,v])=>`${k}=${encodeURIComponent(v)}`).join("&"); return p?("?"+p):""; }

/* ================= OVERVIEW ================= */
async function viewOverview(){
  const d = await api("/dashboard/state");
  const today = [...d.tasks.dueSoon, ...d.tasks.blocked].slice(0,6);
  const recent = d.recentNotes.slice(0,6);
  MAIN.innerHTML = `
  <div class="topbar">
    <h1 class="page">COMMAND <em>OVERVIEW</em></h1>
    <div class="quickadd">
      <input id="qa-input" placeholder="Quick add… try: fix garage sensor !high @home  (or just a title)" onkeydown="if(event.key==='Enter')quickAdd('task')">
      <button onclick="quickAdd('task')">+ Task</button>
      <button class="pink" onclick="quickAdd('idea')">+ Idea</button>
    </div>
  </div>
  <div class="grid cols4">
    <div class="statcard" style="--c:var(--cyan)"><div class="num">${d.summary.activeProjects}</div><div class="lbl">Active Projects</div></div>
    <div class="statcard" style="--c:var(--blue)"><div class="num">${d.summary.openTasks}</div><div class="lbl">Open Tasks</div></div>
    <div class="statcard" style="--c:var(--red)"><div class="num">${d.summary.blockedItems}</div><div class="lbl">Blocked</div></div>
    <div class="statcard" style="--c:var(--purple)"><div class="num">${d.summary.ideas}</div><div class="lbl">Ideas</div></div>
  </div>
  <div class="section-title">Today & At-Risk</div>
  ${today.length? today.map(t=>taskRow(t)).join("") : `<div class="empty">NOTHING URGENT — CLEAR SKIES</div>`}
  <div class="section-title">Recently Updated</div>
  <div class="panel">${recent.map(n=>feedItem(n)).join("")||`<div class="empty">NO ACTIVITY YET</div>`}</div>`;
}
async function quickAdd(kind){
  const inp = document.getElementById("qa-input")||document.getElementById("qa-idea");
  let text = inp.value.trim(); if(!text) return;
  // parse !priority and @area tokens
  let priority, area;
  text = text.replace(/!(urgent|high|medium|low)\b/i,(m,p)=>{priority=p.toLowerCase();return"";});
  text = text.replace(/@(\w+)/,(m,a)=>{area=a;return"";});
  text = text.replace(/\s+/g," ").trim();
  try{
    if(kind==="task") await api("/tasks",{method:"POST",body:{title:text,priority,area}});
    else await api("/ideas",{method:"POST",body:{title:text,priority:priority==="urgent"?"high":priority,category:area}});
    inp.value=""; toast((kind==="task"?"Task":"Idea")+" captured ⚡"); route(true);
  }catch(e){ toast(e.message,true); }
}

        <div class="nb-meta">${esc(n.type)} · ${esc(n.createdBy)} · ${fmtDT(n.createdAt)}</div>
      </div>`).join("") || `<div class="empty">NO NOTES YET</div>`}
  </div>`;
}
async function addNote(parentType, parentId){
  const body=gv("n-body"); if(!body) return;
  try{
    await api(`/${parentType==="idea"?"ideas":parentType+"s"}/${parentId}/notes`,{method:"POST",body:{body,type:gv("n-type")}});
    toast("Note added");
    if(parentType==="project") openProject(parentId);
    else if(parentType==="task") openTask(parentId);
    else openIdea(parentId);
  }catch(e){ toast(e.message,true); }
}
function attachSection(parentType, item){
  const atts = item.attachments||[];
  return `
  <div class="section-title">Attachments & Links</div>
  <div class="row">
    <input id="a-label" placeholder="Label" style="width:120px">
    <input id="a-url" placeholder="https://… or /local/file/path" style="flex:1">
    <button class="sm" onclick="addAttachment('${parentType}','${item.id}')">+ LINK</button>
  </div>
  <div style="margin-top:10px">
    ${atts.map(a=>`<div class="att-row">
      <span class="mono">[${esc(a.type||"link")}]</span>
      ${a.url?`<a href="${esc(a.url)}" target="_blank">${esc(a.label||a.url)}</a>`:`<span>${esc(a.label||"")} <span class="mono">${esc(a.filePath||"")}</span></span>`}
    </div>`).join("") || `<div class="empty">NOTHING ATTACHED</div>`}
  </div>`;
}
async function addAttachment(parentType, parentId){
  const val=gv("a-url"); if(!val) return;
  const isUrl = /^https?:\/\//i.test(val);
  try{
    await api(`/${parentType==="idea"?"ideas":parentType+"s"}/${parentId}/attachments`,{method:"POST",
      body:{label:gv("a-label"), url:isUrl?val:undefined, filePath:isUrl?undefined:val, type:isUrl?"link":"file"}});
    toast("Attached");
    if(parentType==="project") openProject(parentId); else openTask(parentId);
  }catch(e){ toast(e.message,true); }
}
/* debounce for search */
let _deb;
function debounced(fn){ clearTimeout(_deb); _deb=setTimeout(fn, 300); }
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeDrawer(); });
boot();
</script>
</body>
