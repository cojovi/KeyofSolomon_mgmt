<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key of Solomon // Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Rajdhani:wght@400;500;600;700&family=Caveat:wght@500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04060c; --panel:rgba(13,18,33,.78); --panel2:rgba(18,26,46,.85);
  --line:rgba(0,240,255,.14); --line2:rgba(0,240,255,.35);
  --txt:#dbe8fa; --dim:#7e90ad; --faint:#45536d;
  --cyan:#00f0ff; --blue:#3b82f6; --pink:#ff2d95; --purple:#a78bfa; --lime:#b6ff2e; --amber:#ffb020; --red:#ff4757;
  --font-d:'Chakra Petch',sans-serif; --font-b:'Rajdhani',sans-serif; --font-m:'Share Tech Mono',monospace; --font-h:'Caveat',cursive;
  --speed:1;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg); color:var(--txt); font-family:var(--font-b); cursor:none;
  background-image:
    radial-gradient(1200px 600px at 80% -15%, rgba(167,139,250,.08), transparent 55%),
    radial-gradient(1000px 560px at -5% 115%, rgba(0,240,255,.07), transparent 55%),
    radial-gradient(700px 400px at 50% 120%, rgba(255,45,149,.05), transparent 60%),
    repeating-linear-gradient(0deg, transparent 0 44px, rgba(110,160,255,.03) 44px 45px),
    repeating-linear-gradient(90deg, transparent 0 44px, rgba(110,160,255,.03) 44px 45px);
  display:flex;flex-direction:column;
}
body.reduced *, body.reduced *::before, body.reduced *::after{animation:none!important;transition:none!important}
::-webkit-scrollbar{display:none}
/* scanline sweep */
body::after{content:"";position:fixed;left:0;right:0;height:120px;top:-140px;pointer-events:none;z-index:90;
  background:linear-gradient(180deg,transparent,rgba(0,240,255,.025),transparent);
  animation:sweep calc(14s/var(--speed)) linear infinite}
@keyframes sweep{to{transform:translateY(calc(100vh + 280px))}}

/* ====== top bar ====== */
.top{display:flex;align-items:center;gap:26px;padding:14px 26px 10px;flex-shrink:0}
.logo{font-family:var(--font-d);font-weight:700;font-size:26px;letter-spacing:3px;color:#fff}
.logo span{color:var(--cyan);text-shadow:0 0 16px var(--cyan)}
.clock{font-family:var(--font-m);font-size:26px;color:var(--cyan);text-shadow:0 0 14px rgba(0,240,255,.5)}
.clock small{display:block;font-size:11px;color:var(--dim);letter-spacing:2px;text-shadow:none}
.stats{display:flex;gap:14px;margin-left:auto}
.stat{text-align:center;padding:4px 18px;border:1px solid var(--line);border-radius:10px;background:var(--panel);position:relative;overflow:hidden}
.stat b{font-family:var(--font-d);font-size:26px;font-weight:700;display:block;line-height:1.1;color:var(--c)}
.stat i{font-family:var(--font-m);font-style:normal;font-size:9px;letter-spacing:1.6px;color:var(--dim)}
.stat::after{content:"";position:absolute;inset:auto 0 0 0;height:2px;background:var(--c);opacity:.7;box-shadow:0 0 8px var(--c)}
.lastup{font-family:var(--font-m);font-size:10px;color:var(--faint);letter-spacing:1px;text-align:right}

/* ====== ticker ====== */
.tickerwrap{flex-shrink:0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:rgba(5,8,16,.85);overflow:hidden;padding:8px 0;position:relative}
.tickerwrap::before,.tickerwrap::after{content:"";position:absolute;top:0;bottom:0;width:90px;z-index:2;pointer-events:none}
.tickerwrap::before{left:0;background:linear-gradient(90deg,var(--bg),transparent)}
.tickerwrap::after{right:0;background:linear-gradient(-90deg,var(--bg),transparent)}
.ticker{display:flex;gap:48px;width:max-content;animation:tick calc(60s/var(--speed)) linear infinite}
@keyframes tick{to{transform:translateX(-50%)}}
.titem{display:flex;align-items:center;gap:10px;font-family:var(--font-d);font-size:16px;font-weight:600;letter-spacing:.5px;white-space:nowrap}
.titem .tlbl{font-family:var(--font-m);font-size:10px;letter-spacing:2px;padding:3px 9px;border-radius:4px;border:1px solid}
.tl-urgent{color:#fff;border-color:var(--pink);background:rgba(255,45,149,.3);animation:tpulse 1.4s infinite}
.tl-overdue{color:var(--red);border-color:var(--red);background:rgba(255,71,87,.12)}
.tl-blocked{color:var(--amber);border-color:var(--amber);background:rgba(255,176,32,.12)}
.tl-stale{color:var(--dim);border-color:var(--dim)}
.tl-idea{color:var(--purple);border-color:var(--purple);background:rgba(167,139,250,.12)}
.tl-agent{color:var(--cyan);border-color:var(--cyan);background:rgba(0,240,255,.1)}
.tl-updated{color:var(--lime);border-color:var(--lime);background:rgba(182,255,46,.08)}
@keyframes tpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,45,149,.5)}50%{box-shadow:0 0 12px 3px rgba(255,45,149,.6)}}

/* ====== main grid ====== */
.gridwrap{flex:1;display:grid;grid-template-columns:1.15fr 1.5fr 1.05fr;gap:16px;padding:16px 26px 20px;min-height:0}
.col{display:flex;flex-direction:column;gap:14px;min-height:0}
.zone{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 16px;display:flex;flex-direction:column;min-height:0;position:relative;overflow:hidden}
.zone::before{content:"";position:absolute;top:0;left:14px;right:14px;height:1px;background:linear-gradient(90deg,transparent,var(--zc,var(--cyan)),transparent);opacity:.5}
.ztitle{font-family:var(--font-m);font-size:11px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.ztitle .dot{width:7px;height:7px;border-radius:50%;background:var(--zc,var(--cyan));box-shadow:0 0 8px var(--zc,var(--cyan));animation:dotpulse calc(2.4s/var(--speed)) infinite}
@keyframes dotpulse{0%,100%{opacity:1}50%{opacity:.35}}
.zbody{flex:1;overflow:hidden;min-height:0}

/* project cards */
.pcard{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;animation:rise calc(.5s/var(--speed)) backwards}
.pcard.blocked{border-color:rgba(255,71,87,.45);box-shadow:0 0 18px rgba(255,71,87,.08);animation:rise calc(.5s/var(--speed)) backwards, blockpulse calc(3s/var(--speed)) infinite}
@keyframes blockpulse{0%,100%{box-shadow:0 0 10px rgba(255,71,87,.05)}50%{box-shadow:0 0 24px rgba(255,71,87,.22)}}
@keyframes rise{from{opacity:0;transform:translateY(14px)}}
.pcard h3{font-family:var(--font-d);font-size:17px;font-weight:600;color:#fff;display:flex;justify-content:space-between;gap:8px;align-items:baseline}
.pcard .pd{color:var(--dim);font-size:13.5px;line-height:1.35;margin:2px 0 6px}
.prog{height:8px;background:rgba(0,240,255,.07);border-radius:4px;overflow:hidden;border:1px solid rgba(0,240,255,.12);position:relative}
.prog i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--blue),var(--cyan));box-shadow:0 0 12px rgba(0,240,255,.55);transition:width 1s ease;position:relative;overflow:hidden}
.prog i::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);transform:translateX(-100%);animation:shimmer calc(2.8s/var(--speed)) infinite}
@keyframes shimmer{to{transform:translateX(100%)}}
.prow{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-family:var(--font-m);font-size:10px;color:var(--dim);letter-spacing:1px}
.badge{display:inline-block;font-family:var(--font-m);font-size:9px;letter-spacing:1.2px;text-transform:uppercase;padding:2px 7px;border-radius:4px;border:1px solid}
.b-active{color:var(--cyan);border-color:rgba(0,240,255,.4)}
.b-planning{color:var(--purple);border-color:rgba(167,139,250,.4)}
.b-paused{color:var(--amber);border-color:rgba(255,176,32,.4)}
.b-blocked{color:var(--red);border-color:var(--red);background:rgba(255,71,87,.12)}
.b-urgent{color:#fff;border-color:var(--pink);background:rgba(255,45,149,.28)}
.b-high{color:var(--pink);border-color:rgba(255,45,149,.4)}
.b-medium{color:var(--amber);border-color:rgba(255,176,32,.35)}
.b-low{color:var(--dim);border-color:rgba(122,138,166,.3)}

/* task blocks */
.tgroups{display:grid;grid-template-columns:1fr 1fr;gap:10px;height:100%;grid-auto-rows:minmax(0,1fr);overflow:hidden}
.tgroup{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:rgba(9,13,24,.6);display:flex;flex-direction:column;min-height:0;overflow:hidden}
.tgroup.g-blocked{border-color:rgba(255,71,87,.4)}
.tgroup.g-due{border-color:rgba(255,176,32,.35)}
.tg-title{font-family:var(--font-m);font-size:10px;letter-spacing:2px;margin-bottom:8px;display:flex;justify-content:space-between;color:var(--gc,var(--cyan))}
.tg-title b{color:#fff}
.titem2{padding:7px 9px;border-radius:8px;background:rgba(16,23,40,.85);border:1px solid rgba(0,240,255,.08);margin-bottom:6px;font-size:14.5px;font-weight:600;line-height:1.25;animation:rise calc(.45s/var(--speed)) backwards}
.titem2 small{display:block;font-family:var(--font-m);font-size:9px;font-weight:400;color:var(--dim);letter-spacing:1px;margin-top:2px}
.titem2.urgent{border-color:rgba(255,45,149,.5);animation:rise calc(.45s/var(--speed)) backwards, upulse calc(2s/var(--speed)) infinite}
@keyframes upulse{0%,100%{background:rgba(16,23,40,.85)}50%{background:rgba(255,45,149,.12)}}
.titem2.overdue small{color:var(--red)}

/* ideas carousel */
.carousel{position:relative;height:100%}
.icard{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;opacity:0;transform:translateX(36px) rotate(.4deg);transition:all calc(.7s/var(--speed)) cubic-bezier(.2,.8,.2,1);pointer-events:none;padding:4px 8px}
.icard.on{opacity:1;transform:none}
.icard h3{font-family:var(--font-h);font-size:30px;color:#efe5ff;text-shadow:0 0 18px rgba(167,139,250,.45);line-height:1.05;margin-bottom:8px}
.icard .ib{font-family:var(--font-h);font-size:20px;color:#bdaaee;line-height:1.25;max-height:96px;overflow:hidden}
.icard .im{font-family:var(--font-m);font-size:10px;color:var(--faint);letter-spacing:1.5px;margin-top:10px}
.idots{display:flex;gap:5px;justify-content:center;margin-top:6px;flex-shrink:0}
.idots i{width:18px;height:3px;border-radius:2px;background:rgba(167,139,250,.2);transition:.3s}
.idots i.on{background:var(--purple);box-shadow:0 0 8px var(--purple)}

/* feeds */
.feed{display:flex;flex-direction:column;gap:7px}
.fitem{display:flex;gap:9px;font-size:13.5px;line-height:1.3;animation:rise calc(.5s/var(--speed)) backwards;align-items:baseline}
.fitem .fw{font-family:var(--font-m);font-size:9px;letter-spacing:1px;padding:2px 6px;border-radius:4px;border:1px solid;white-space:nowrap}
.fw-user{color:var(--cyan);border-color:rgba(0,240,255,.3)}
.fw-agent{color:var(--purple);border-color:rgba(167,139,250,.45)}
.fw-system{color:var(--dim);border-color:rgba(122,138,166,.3)}
.fitem .fb{flex:1;color:var(--txt)}
.fitem .ft{font-family:var(--font-m);font-size:9px;color:var(--faint);white-space:nowrap}

/* agent avatar */
.agenthead{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.avatar{width:44px;height:44px;border-radius:50%;border:1px solid var(--line2);position:relative;flex-shrink:0;background:radial-gradient(circle at 35% 35%, rgba(0,240,255,.25), rgba(10,14,26,.9))}
.avatar::before{content:"";position:absolute;inset:6px;border-radius:50%;border:1px dashed rgba(0,240,255,.4);animation:spin calc(9s/var(--speed)) linear infinite}
.avatar::after{content:"";position:absolute;inset:14px;border-radius:50%;background:var(--av,var(--cyan));box-shadow:0 0 16px var(--av,var(--cyan));animation:dotpulse calc(2s/var(--speed)) infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.avstate{font-family:var(--font-m);font-size:10px;letter-spacing:2px;color:var(--dim)}
.avstate b{display:block;font-size:13px;color:var(--av,var(--cyan));letter-spacing:3px}

.offline{position:fixed;inset:0;background:rgba(4,6,12,.92);z-index:99;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
.offline.show{display:flex}
.offline h2{font-family:var(--font-d);color:var(--red);letter-spacing:4px;font-size:30px;text-shadow:0 0 24px rgba(255,71,87,.6)}
.offline p{font-family:var(--font-m);color:var(--dim);font-size:12px;letter-spacing:2px}
.empty{color:var(--faint);font-family:var(--font-m);font-size:10px;letter-spacing:2px;text-align:center;padding:18px 6px}
</style>
</head>
<body>
  <div class="top">
    <div class="logo">KEY OF <span>SOLOMON</span></div>
    <div class="clock"><span id="clock">--:--</span><small id="dateline">LOADING…</small></div>
    <div class="stats">
      <div class="stat" style="--c:var(--cyan)"><b id="s-proj">0</b><i>ACTIVE PROJ</i></div>
      <div class="stat" style="--c:var(--blue)"><b id="s-tasks">0</b><i>OPEN TASKS</i></div>
      <div class="stat" style="--c:var(--red)"><b id="s-blocked">0</b><i>BLOCKED</i></div>
      <div class="stat" style="--c:var(--purple)"><b id="s-ideas">0</b><i>IDEAS</i></div>
    </div>
    <div class="lastup">LAST SYNC<br><span id="lastup">—</span></div>
  </div>

  <div class="tickerwrap"><div class="ticker" id="ticker"></div></div>

  <div class="gridwrap">
    <!-- left: projects -->
    <div class="col">
      <div class="zone" style="--zc:var(--cyan);flex:1">
        <div class="ztitle"><span class="dot"></span> ACTIVE PROJECTS</div>
        <div class="zbody" id="projects"></div>
      </div>
    </div>
    <!-- center: tasks -->
    <div class="col">
      <div class="zone" style="--zc:var(--blue);flex:1">
        <div class="ztitle"><span class="dot"></span> TASK GRID</div>
        <div class="zbody"><div class="tgroups" id="tgroups"></div></div>
      </div>
    </div>
    <!-- right: ideas + feeds + agent -->
    <div class="col">
      <div class="zone" style="--zc:var(--purple);flex:0 0 218px">
        <div class="ztitle"><span class="dot"></span> IDEA STREAM</div>
        <div class="zbody"><div class="carousel" id="ideas"></div></div>
        <div class="idots" id="idots"></div>
      </div>
      <div class="zone" style="--zc:var(--lime);flex:1">
        <div class="ztitle"><span class="dot"></span> RECENT UPDATES</div>
        <div class="zbody feed" id="notes"></div>
      </div>
      <div class="zone" style="--zc:var(--purple);flex:0 0 200px" id="agentzone">
        <div class="agenthead">
          <div class="avatar" id="avatar"></div>
          <div class="avstate">AGENT STATUS<b id="avstate">IDLE</b></div>
        </div>
        <div class="zbody feed" id="agentfeed"></div>
      </div>
    </div>
  </div>

  <div class="offline" id="offline"><h2>SIGNAL LOST</h2><p>RECONNECTING TO KEY OF SOLOMON CORE…</p></div>

<script>
let TOKEN=null, API="/api/v1", SETTINGS={}, ideaIdx=0, ideaTimer=null, pollTimer=null;
const $=id=>document.getElementById(id);
const esc=s=>(s??"").toString().replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const ago=s=>{if(!s)return"";const d=(Date.now()-new Date(s))/1000;
  if(d<60)return"NOW";if(d<3600)return Math.floor(d/60)+"M";if(d<86400)return Math.floor(d/3600)+"H";return Math.floor(d/86400)+"D";};
const fmtDue=s=>s?new Date(s).toLocaleDateString(undefined,{month:"short",day:"numeric"}).toUpperCase():"";

function tickClock(){
  const n=new Date();
  $("clock").textContent=n.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});
  $("dateline").textContent=n.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"}).toUpperCase();
}
setInterval(tickClock,1000);tickClock();

async function boot(){
  try{ const r=await fetch("/ui-config"); const j=await r.json(); TOKEN=j.data.token; API=j.data.apiBase; }
  catch(e){ showOffline(true); setTimeout(boot,4000); return; }
  await refresh();
  connectSSE();
  schedulePoll();
}
function schedulePoll(){
  clearInterval(pollTimer);
  const secs=Math.max(5,Number(SETTINGS.dashboardRefreshSeconds)||30);
  pollTimer=setInterval(refresh, secs*1000);
}
function connectSSE(){
  try{
    const sse=new EventSource(API+"/events?token="+encodeURIComponent(TOKEN));
    sse.addEventListener("data-changed",e=>{
      refresh();
      try{ const d=JSON.parse(e.data); if(d.by==="agent") setAvatar("task updated"); }catch(_){}
    });
    sse.addEventListener("settings-changed",()=>refresh());
    sse.onerror=()=>{ sse.close(); setTimeout(connectSSE,5000); };
  }catch(e){}
}
function showOffline(on){ $("offline").classList.toggle("show",on); }

async function refresh(){
  let d;
  try{
    const r=await fetch(API+"/dashboard/state",{headers:{Authorization:"Bearer "+TOKEN}});
    d=(await r.json()).data;
    showOffline(false);
  }catch(e){ showOffline(true); return; }
  SETTINGS=d.settings||{};
  applySettings();
  render(d);
  $("lastup").textContent=new Date(d.generatedAt).toLocaleTimeString();
}
function applySettings(){
  const sp=Math.max(.1,Number(SETTINGS.animationSpeed)||1);
  document.documentElement.style.setProperty("--speed",sp);
  document.body.classList.toggle("reduced", SETTINGS.reducedMotion==="true");
}

function render(d){
  /* summary */
  $("s-proj").textContent=d.summary.activeProjects;
  $("s-tasks").textContent=d.summary.openTasks;
  $("s-blocked").textContent=d.summary.blockedItems;
  $("s-ideas").textContent=d.summary.ideas;

  /* ticker (duplicate for seamless loop) */
  const titems=d.ticker.map(t=>
    `<div class="titem"><span class="tlbl tl-${esc(t.type)}">${esc(t.label)}</span> ${esc(t.text)}</div>`).join("");
  $("ticker").innerHTML=titems+titems || `<div class="titem"><span class="tlbl tl-updated">OK</span> ALL QUIET ON THE NEON FRONT</div>`;

  /* projects */
  $("projects").innerHTML=d.projects.slice(0,5).map((p,i)=>`
    <div class="pcard ${p.status==='blocked'?'blocked':''}" style="animation-delay:${i*0.08}s">
      <h3>${esc(p.title)} ${p.priority?`<span class="badge b-${esc(p.priority)}">${esc(p.priority)}</span>`:""}</h3>
      <div class="pd">${esc(p.shortDescription||"")}</div>
      <div class="prog"><i style="width:${p.progressPercent}%"></i></div>
      <div class="prow">
        <span><span class="badge b-${esc(p.status)}">${esc(p.status)}</span> ${p.category?(" "+esc(p.category).toUpperCase()):""}</span>
        <span>${p.progressPercent}% · UPD ${ago(p.updatedAt)}</span>
      </div>
    </div>`).join("") || `<div class="empty">NO ACTIVE PROJECTS</div>`;

  /* task groups */
  const groups=[
    {key:"inProgress",label:"IN PROGRESS",cls:"",gc:"var(--cyan)"},
    {key:"todo",label:"TODO",cls:"",gc:"var(--blue)"},
    {key:"dueSoon",label:"DUE SOON",cls:"g-due",gc:"var(--amber)"},
    {key:"blocked",label:"BLOCKED",cls:"g-blocked",gc:"var(--red)"},
  ];
  $("tgroups").innerHTML=groups.map(g=>{
    const items=d.tasks[g.key]||[];
    const waiting=g.key==="todo"?(d.tasks.waiting||[]):[];
    return `<div class="tgroup ${g.cls}" style="--gc:${g.gc}">
      <div class="tg-title">${g.label} <b>${items.length}</b></div>
      ${items.slice(0,4).map((t,i)=>{
        const over=t.dueDate&&new Date(t.dueDate)<new Date();
        return `<div class="titem2 ${t.priority==='urgent'?'urgent':''} ${over?'overdue':''}" style="animation-delay:${i*0.07}s">
          ${esc(t.title)}
          <small>${t.priority?("["+esc(t.priority).toUpperCase()+"] "):""}${t.dueDate?("DUE "+fmtDue(t.dueDate)+(over?" ⚠":"")):""}${t.agentCandidate?" · ⌬":""}</small>
        </div>`;}).join("")||`<div class="empty">CLEAR</div>`}
      ${waiting.length?`<div class="tg-title" style="margin-top:4px;--gc:var(--amber)">WAITING <b>${waiting.length}</b></div>${waiting.slice(0,2).map(t=>`<div class="titem2">${esc(t.title)}</div>`).join("")}`:""}
    </div>`;}).join("");

  /* ideas carousel */
  const ideas=d.ideas;
  if(ideaIdx>=ideas.length) ideaIdx=0;
  $("ideas").innerHTML=ideas.map((i,n)=>`
    <div class="icard ${n===ideaIdx?"on":""}" data-i="${n}">
      <h3>✦ ${esc(i.title)}</h3>
      <div class="ib">${esc((i.body||"").slice(0,150))}</div>
      <div class="im">${esc(i.category||"").toUpperCase()} ${(i.tags||[]).map(t=>"#"+esc(t)).join(" ")} · ${ago(i.createdAt)} AGO</div>
    </div>`).join("")||`<div class="empty">IDEA VAULT EMPTY</div>`;
  $("idots").innerHTML=ideas.map((_,n)=>`<i class="${n===ideaIdx?"on":""}"></i>`).join("");
  clearInterval(ideaTimer);
  if(ideas.length>1 && SETTINGS.reducedMotion!=="true"){
    const per=Math.max(3,7/Math.max(.1,Number(SETTINGS.animationSpeed)||1));
    ideaTimer=setInterval(()=>{
      ideaIdx=(ideaIdx+1)%ideas.length;
      document.querySelectorAll("#ideas .icard").forEach(c=>c.classList.toggle("on",Number(c.dataset.i)===ideaIdx));
      document.querySelectorAll("#idots i").forEach((c,n)=>c.classList.toggle("on",n===ideaIdx));
    },per*1000);
  }

  /* notes feed */
  $("notes").innerHTML=d.recentNotes.slice(0,9).map((n,i)=>`
    <div class="fitem" style="animation-delay:${i*0.05}s">
      <span class="fw fw-${esc(n.createdBy)}">${esc(n.createdBy)}</span>
      <span class="fb">${esc(n.body.slice(0,90))}${n.body.length>90?"…":""}</span>
      <span class="ft">${ago(n.createdAt)}</span>
    </div>`).join("")||`<div class="empty">NO UPDATES</div>`;

  /* agent feed + avatar */
  $("agentfeed").innerHTML=d.agentActions.slice(0,4).map((a,i)=>`
    <div class="fitem" style="animation-delay:${i*0.05}s">
      <span class="fw fw-agent">${esc(a.agentName)}</span>
      <span class="fb">${esc(a.summary.slice(0,80))}</span>
      <span class="ft">${ago(a.createdAt)}</span>
    </div>`).join("")||`<div class="empty">NO AGENT ACTIVITY</div>`;

  const latest=d.agentActions[0];
  if(latest){
    const mins=(Date.now()-new Date(latest.createdAt))/60000;
    if(latest.actionType==="error") setAvatar("warning");
    else if(mins<10) setAvatar("task updated");
    else if(mins<60) setAvatar("thinking");
    else setAvatar("idle");
  } else setAvatar("idle");
}
function setAvatar(state){
  const map={ "idle":["var(--cyan)","IDLE"], "thinking":["var(--purple)","THINKING"],
    "task updated":["var(--lime)","ACTIVE"], "warning":["var(--red)","ALERT"] };
  const [c,label]=map[state]||map.idle;
  $("agentzone").style.setProperty("--av",c);
  $("avstate").textContent=label;
}
boot();
</script>
</body>
</html>
